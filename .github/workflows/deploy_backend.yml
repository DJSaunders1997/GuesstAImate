name: Deploy backend to Azure Container Apps

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy_backend.yml"

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC JWT token
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.GUESSTAIMATE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.GUESSTAIMATE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.GUESSTAIMATE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image, deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.GUESSTAIMATE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.GUESSTAIMATE_REGISTRY_PASSWORD }}
          containerAppName: guesstaimate
          resourceGroup: ContainerApps
          imageToBuild: ghcr.io/djsaunders1997/guesstaimate:${{ github.sha }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#22c55e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GuesstAImate" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>GuesstAImate</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Guesst<span class="ai">AI</span>mate</h1>
  <button id="targets-btn" onclick="openTargets()" title="Edit daily targets">&#9881;</button>
  <div id="daily-total"><span id="daily-label">Today</span>: <strong id="total-cal">0</strong> kcal</div>
  <div id="macro-totals">
    <span><span class="macro-p">Protein</span> <strong id="total-protein">0</strong>g</span>
    <span><span class="macro-c">Carbs</span> <strong id="total-carbs">0</strong>g</span>
    <span><span class="macro-f">Fat</span> <strong id="total-fat">0</strong>g</span>
    <span><span class="macro-fi">Fibre</span> <strong id="total-fibre">0</strong>g</span>
  </div>
  <div id="streak-display"></div>
  <div id="auth-section"><button class="auth-btn auth-signin" onclick="signInWithGoogle()">Sign in with Google</button></div>
</header>

<div class="record-section">
  <button id="record-btn" aria-label="Record">🎙️</button>
  <canvas id="waveform" hidden></canvas>
  <div id="status">Tap to record what you ate — or to remove / edit foods</div>
  <div id="transcript"></div>
</div>

<div class="logs-section">
  <div class="logs-header">
    <div class="day-nav">
      <button id="prev-day" onclick="prevDay()">&#8249;</button>
      <span id="day-label">Today</span>
      <button id="next-day" onclick="nextDay()" disabled>&#8250;</button>
    </div>
    <button id="add-btn" onclick="showAddForm()" title="Add entry manually">+</button>
    <button id="export-btn">Export CSV</button>
  </div>
  <div id="log-list"></div>

  <div class="chart-section">
    <div class="chart-header"><span>Calories</span></div>
    <canvas id="cal-chart"></canvas>
  </div>

  <div class="chart-section">
    <div class="chart-header"><span>Macros</span></div>
    <div class="macro-grid">
      <div class="macro-subplot">
        <div class="macro-subplot-header macro-p">Protein</div>
        <canvas id="chart-protein"></canvas>
      </div>
      <div class="macro-subplot">
        <div class="macro-subplot-header macro-c">Carbs</div>
        <canvas id="chart-carbs"></canvas>
      </div>
      <div class="macro-subplot">
        <div class="macro-subplot-header macro-f">Fat</div>
        <canvas id="chart-fat"></canvas>
      </div>
      <div class="macro-subplot">
        <div class="macro-subplot-header macro-fi">Fibre</div>
        <canvas id="chart-fibre"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- Voice-action confirmation dialog -->
<div id="confirm-overlay">
  <div id="confirm-dialog">
    <p id="confirm-message"></p>
    <div class="confirm-actions">
      <button id="confirm-yes" class="save-btn">Confirm</button>
      <button id="confirm-no"  class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- Targets dialog -->
<div id="targets-overlay" onclick="closeTargets()"></div>
<div id="targets-dialog">
  <h3>Daily Targets</h3>
  <label><span class="macro-cal">Calories</span>
    <input type="number" id="t-calories" min="500" max="10000" /> kcal
  </label>
  <label><span class="macro-p">Protein</span>
    <input type="number" id="t-protein" min="0" max="500" /> g
  </label>
  <label><span class="macro-c">Carbs</span>
    <input type="number" id="t-carbs" min="0" max="1000" /> g
  </label>
  <label><span class="macro-f">Fat</span>
    <input type="number" id="t-fat" min="0" max="500" /> g
  </label>
  <label><span class="macro-fi">Fibre</span>
    <input type="number" id="t-fibre" min="0" max="200" /> g
  </label>
  <div class="targets-actions">
    <button onclick="saveTargets()">Save</button>
    <button class="cancel-btn" onclick="closeTargets()">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="storage.js"></script>
  <script src="render.js"></script>
  <script src="charts.js"></script>
  <script src="recording.js"></script>
  <script src="auth.js"></script>
  <script src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>

<footer>
  Website by <a href="https://github.com/DJSaunders1997" target="_blank" rel="noopener">David Saunders</a>
  &middot;
  <a href="https://github.com/DJSaunders1997/GuesstAImate" target="_blank" rel="noopener">Repo</a>
</footer>

</body>
</html>

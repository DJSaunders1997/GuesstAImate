<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuesstAImate</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Guesst<span class="ai">AI</span>mate</h1>
  <div id="daily-total"><span id="daily-label">Today</span>: <strong id="total-cal">0</strong> kcal</div>
</header>

<div class="record-section">
  <button id="record-btn" aria-label="Record">🎙️</button>
  <div id="status">Tap to record what you ate</div>
</div>

<div class="logs-section">
  <div class="logs-header">
    <div class="day-nav">
      <button id="prev-day" onclick="prevDay()">&#8249;</button>
      <span id="day-label">Today</span>
      <button id="next-day" onclick="nextDay()" disabled>&#8250;</button>
    </div>
    <button id="export-btn">Export CSV</button>
  </div>
  <div id="log-list"></div>
</div>

<script src="app.js"></script>

</body>
</html>
